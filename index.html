<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Katalog Produk</title>

  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      padding: 20px;
      background: #f5f5f5;
    }

    h2 { text-align: center; }

    .container {
      display: grid;
      grid-template-columns: repeat(2, 300px);
      gap: 80px;
      justify-content: center;
    }

    @media (max-width: 600px){
      .container { grid-template-columns: 1fr; }
    }

    .card {
      background: white;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      position: relative;
      overflow: hidden;
    }

    .card img {
      width: 100%;
      max-height: 260px;
      object-fit: contain;
    }

    .img-box {
      position: relative;
    }

    .badge-netto {
      position: absolute;
      top: 30px;
      right: 10px;
      background: #4caf50;
      color: white;
      padding: 4px 8px;
      font-size: 11px;
      border-radius: 5px;
      font-weight: bold;
    }

    .badge-new {
      position: absolute;
      top: 10px;
      right: 10px;
      background: #ff9800;
      color: white;
      padding: 4px 8px;
      font-size: 11px;
      border-radius: 5px;
      font-weight: bold;
    }

    /* =====================
       FILTER BOX (NEW)
    ===================== */
    .filter-box {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 10px 0 20px;
    }

    .filter-box label {
      background: white;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid #ddd;
      cursor: pointer;
      font-size: 14px;
    }
  </style>
</head>

<body>

<h2>Katalog Produk</h2>

<div id="userInfo"></div>

<div id="g_id_signin"></div>

<!-- =====================
     FILTER CHECKBOX UI
===================== -->
<div class="filter-box">
  <label>
    <input type="checkbox" id="filterNew"> NEW
  </label>

  <label>
    <input type="checkbox" id="filterNetto"> NETTO
  </label>

  <label>
    <input type="checkbox" id="filterPpn"> PPN
  </label>
</div>

<div id="produk-list" class="container"></div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyhqfHg8tc1aWaDiDhCZThIQd7lbWztxGl2PpJQQb4fNWUUXH5nglmiFRy4xJpnvrcF/exec";

let googleToken = null;
let userEmail = null;

/* =====================
   FILTER STATE
===================== */
let filterState = {
  new: false,
  netto: false,
  ppn: false
};

/* INIT GOOGLE LOGIN */
window.onload = function () {

  google.accounts.id.initialize({
    client_id: "317305463836-el7i52ferjgevc5t31r8ra3r47abbppf.apps.googleusercontent.com",
    callback: handleCredentialResponse
  });

  google.accounts.id.renderButton(
    document.getElementById("g_id_signin"),
    {
      theme: "outline",
      size: "large"
    }
  );

  /* =====================
     CHECKBOX EVENTS
  ===================== */
  document.getElementById("filterNew").addEventListener("change", (e) => {
    filterState.new = e.target.checked;
    loadProduk();
  });

  document.getElementById("filterNetto").addEventListener("change", (e) => {
    filterState.netto = e.target.checked;
    loadProduk();
  });

  document.getElementById("filterPpn").addEventListener("change", (e) => {
    filterState.ppn = e.target.checked;
    loadProduk();
  });

  loadProduk();
};

/* LOGIN CALLBACK */
function handleCredentialResponse(response) {

  googleToken = response.credential;

  const payload = JSON.parse(atob(googleToken.split('.')[1]));
  userEmail = payload.email;

  document.getElementById("userInfo").innerText =
    "Login: " + userEmail;

  loadProduk();
}

/* BUILD QUERY PARAM */
function buildQuery() {
  const params = [];

  if (googleToken) {
    params.push("token=" + encodeURIComponent(googleToken));
  }

  if (filterState.new) params.push("new=true");
  if (filterState.netto) params.push("netto=true");
  if (filterState.ppn) params.push("ppn=true");

  return params.length ? "?" + params.join("&") : "";
}

/* LOAD DATA */
async function loadProduk() {

  const url = API_URL + buildQuery();

  const res = await fetch(url);
  const json = await res.json();

  const container = document.getElementById("produk-list");
  container.innerHTML = "";

  if (!json.data || json.data.length === 0) {
    container.innerHTML = "<p>Data kosong</p>";
    return;
  }

  json.data.forEach(item => {

    const spec = item.spec || {};

    const specHtml = Object.entries(spec)
      .map(([k,v]) => `<p><b>${k}:</b> ${v}</p>`)
      .join("");

    const hasInner = item.inner && item.inner !== "-";

    let packaging = "";

    if (hasInner) {
      packaging = `${item.inner}/${item.carton} ${item.satuan || ""}`;
    } else {
      packaging = `${item.carton} ${item.satuan || ""}`;
    }

    const nettoBadge = item.netto === "YES"
      ? `<span class="badge-netto">NETTO</span>`
      : "";

    const newBadge = item.new === "YES"
      ? `<span class="badge-new">NEW</span>`
      : "";

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
    <div class="img-box">
      ${nettoBadge}
      ${newBadge}

      <img src="images/${item.kategori}/${item["sub kategori"]}/${item.kode}.webp">
    </div>

    <h3 style="text-align:center;">${item["nama item"]}</h3>

    ${specHtml}

    <p><b>Packaging:</b> ${packaging}</p>

    <p><b>Stock:</b> ${item.stock}</p>

    ${
      json.role === "sales"
        ? `<p><b>Harga:</b> Rp. ${Number(item.harga).toLocaleString("id-ID")}/${item.satuan || "-"}</p>`
        : ""
    }
    `;

    container.appendChild(div);
  });
}

</script>

</body>
</html>
