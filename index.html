<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Katalog Produk</title>

  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      padding: 20px;
      background: #f5f5f5;
    }

    h2 { text-align: center; }

    .container {
      display: grid;
      grid-template-columns: repeat(2, 300px);
      gap: 80px;
      justify-content: center;
    }

    @media (max-width: 600px){
      .container { grid-template-columns: 1fr; }
    }

    .card {
      background: white;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      overflow: hidden;
    }

    .card img {
      width: 100%;
      max-height: 260px;
      object-fit: contain;
    }

    .img-box { position: relative; }

    .badge-netto {
      position: absolute;
      top: 30px;
      right: 10px;
      background: #4caf50;
      color: white;
      padding: 4px 8px;
      font-size: 11px;
      border-radius: 5px;
      font-weight: bold;
    }

    .badge-new {
      position: absolute;
      top: 10px;
      right: 10px;
      background: #ff9800;
      color: white;
      padding: 4px 8px;
      font-size: 11px;
      border-radius: 5px;
      font-weight: bold;
    }

    .filter-box {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 10px 0 20px;
    }

    .filter-box label {
      background: white;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid #ddd;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h2>Katalog Produk</h2>

<div id="userInfo"></div>

<div id="g_id_signin"></div>

<div id="filterBox" class="filter-box"></div>

<div id="produk-list" class="container"></div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyhqfHg8tc1aWaDiDhCZThIQd7lbWztxGl2PpJQQb4fNWUUXH5nglmiFRy4xJpnvrcF/exec";

/* =====================
   GLOBAL STATE
===================== */
let googleToken = null;
let userRole = "public";
let allData = [];

let filterState = {
  new: false,
  netto: false,
  ppn: false
};

/* =====================
   INIT
===================== */
window.onload = function () {

  google.accounts.id.initialize({
    client_id: "317305463836-el7i52ferjgevc5t31r8ra3r47abbppf.apps.googleusercontent.com",
    callback: handleCredentialResponse
  });

  google.accounts.id.renderButton(
    document.getElementById("g_id_signin"),
    { theme: "outline", size: "large" }
  );

  // AUTO LOGIN
  googleToken = localStorage.getItem("googleToken");

  if (googleToken) {
    try {
      const payload = JSON.parse(atob(googleToken.split('.')[1]));
      document.getElementById("userInfo").innerText =
        "Login: " + payload.email;
    } catch (e) {
      localStorage.removeItem("googleToken");
      googleToken = null;
    }
  }

  loadProduk();
};

/* =====================
   LOGIN
===================== */
function handleCredentialResponse(response) {
  googleToken = response.credential;
  localStorage.setItem("googleToken", googleToken);

  const payload = JSON.parse(atob(googleToken.split('.')[1]));
  document.getElementById("userInfo").innerText =
    "Login: " + payload.email;

  loadProduk();
}

/* =====================
   RENDER FILTER (1x saja)
===================== */
function renderFilters(role) {
  const box = document.getElementById("filterBox");
  box.innerHTML = "";

  userRole = role;

  if (role === "public") {
    box.innerHTML = `
      <label><input type="checkbox" id="filterNew"> NEW</label>
    `;
  }

  if (role === "sales") {
    box.innerHTML = `
      <label><input type="checkbox" id="filterNew"> NEW</label>
      <label><input type="checkbox" id="filterNetto"> NETTO</label>
      <label><input type="checkbox" id="filterPpn"> PPN</label>
    `;
  }

  bindFilters();
}

/* =====================
   EVENT FILTER (CLIENT ONLY)
===================== */
function bindFilters() {

  const newEl = document.getElementById("filterNew");
  const nettoEl = document.getElementById("filterNetto");
  const ppnEl = document.getElementById("filterPpn");

  if (newEl) {
    newEl.onchange = (e) => {
      filterState.new = e.target.checked;
      renderProduk();
    };
  }

  if (nettoEl) {
    nettoEl.onchange = (e) => {
      filterState.netto = e.target.checked;
      renderProduk();
    };
  }

  if (ppnEl) {
    ppnEl.onchange = (e) => {
      filterState.ppn = e.target.checked;
      renderProduk();
    };
  }
}

/* =====================
   LOAD DATA ONCE
===================== */
async function loadProduk() {

  const res = await fetch(API_URL + buildQuery());
  const json = await res.json();

  userRole = json.role;

  allData = json.data || [];

  renderFilters(json.role);
  renderProduk();
}

/* =====================
   BUILD QUERY (LOGIN ONLY)
===================== */
function buildQuery() {
  const params = [];

  if (googleToken) {
    params.push("token=" + encodeURIComponent(googleToken));
  }

  return params.length ? "?" + params.join("&") : "";
}

/* =====================
   RENDER PRODUCT (CLIENT FILTER)
===================== */
function renderProduk() {

  const container = document.getElementById("produk-list");
  container.innerHTML = "";

  let data = allData;

  if (filterState.new) {
    data = data.filter(item => item.new === "YES");
  }

  if (filterState.netto) {
    data = data.filter(item => item.netto === "YES");
  }

  if (filterState.ppn) {
    data = data.filter(item => item.ppn);
  }

  if (!data.length) {
    container.innerHTML = "<p>Data tidak ditemukan</p>";
    return;
  }

  data.forEach(item => {

    const spec = item.spec || {};
    const specHtml = Object.entries(spec)
      .map(([k,v]) => `<p><b>${k}:</b> ${v}</p>`)
      .join("");

    let packaging = item.inner && item.inner !== "-"
      ? `${item.inner}/${item.carton} ${item.satuan || ""}`
      : `${item.carton} ${item.satuan || ""}`;

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="img-box">
        ${item.netto === "YES" ? `<span class="badge-netto">NETTO</span>` : ""}
        ${item.new === "YES" ? `<span class="badge-new">NEW</span>` : ""}
        <img src="images/${item.kategori}/${item["sub kategori"]}/${item.kode}.webp">
      </div>

      <h3 style="text-align:center;">${item["nama item"]}</h3>

      ${specHtml}

      <p><b>Packaging:</b> ${packaging}</p>
      <p><b>Stock:</b> ${item.stock}</p>
    `;

    container.appendChild(div);
  });
}

</script>

</body>
</html>
