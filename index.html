<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Katalog</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
    }

    .container {
      padding: 10px;
    }

    .card {
      border: 1px solid #ddd;
      margin: 10px;
      padding: 10px;
      border-radius: 6px;
    }
  </style>
</head>

<body>

  <h2>Katalog Produk</h2>

  <!-- 🔥 WAJIB ADA -->
  <div id="produk-list" class="container"></div>

  <!-- 🔥 SCRIPT HARUS DI BAWAH -->
  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyhqfHg8tc1aWaDiDhCZThIQd7lbWztxGl2PpJQQb4fNWUUXH5nglmiFRy4xJpnvrcF/exec"; // ganti

    async function loadProduk() {
      const container = document.getElementById("produk-list");

      // 🔥 SAFETY CHECK (biar gak error lagi)
      if (!container) {
        console.error("DIV produk-list tidak ditemukan");
        return;
      }

      try {
        const res = await fetch(API_URL);
        const json = await res.json();

        console.log(json); // DEBUG

        container.innerHTML = "";

        if (!json.data) {
          container.innerHTML = "Data kosong";
          return;
        }

        json.data.forEach(item => {
          const div = document.createElement("div");
          div.className = "card";

          div.innerHTML = `
            <h3>${item["nama item"] || "-"}</h3>
            <p>Kode: ${item.kode || "-"}</p>
            <p>Kategori: ${item.kategori || "-"}</p>
            <p>Stock: ${item.stock || 0}</p>
          `;

          container.appendChild(div);
        });

      } catch (err) {
        console.error(err);
        container.innerHTML = "Gagal load data";
      }
    }

    // 🔥 INI KUNCI NYA
    window.onload = loadProduk;
  </script>

</body>
</html>
