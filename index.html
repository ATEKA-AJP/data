<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Katalog Produk</title>

<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>
body {
  font-family: Arial;
  margin: 0;
  padding: 20px;
  background: #f5f5f5;
}

h2 { text-align:center; }

#userInfo { text-align:center; margin-bottom:10px; }

.container {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
  gap:24px;
}

.card {
  background:white;
  padding:15px;
  border-radius:12px;
  border:1px solid #ddd;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.card img {
  width:100%;
  max-height:260px;
  object-fit:contain;
}

.img-box { position:relative; }

.badge-netto, .badge-new {
  position:absolute;
  right:10px;
  color:white;
  padding:4px 8px;
  font-size:11px;
  border-radius:5px;
  font-weight:bold;
}

.badge-netto { top:30px; background:#4caf50; }
.badge-new { top:10px; background:#c12327; }

.filter-box {
  display:flex;
  justify-content:center;
  gap:15px;
  flex-wrap:wrap;
  margin:10px 0;
}

.filter-box label {
  background:white;
  padding:8px 12px;
  border:1px solid #ddd;
  border-radius:8px;
  cursor:pointer;
}

.search-box { text-align:center; margin-bottom:10px; }

#searchInput {
  padding:8px;
  width:250px;
  border-radius:6px;
  border:1px solid #ccc;
}

.price {
  font-size:18px;
  font-weight:bold;
  color:#e53935;
  margin-top:auto;
}

.meta-row {
  display:flex;
  justify-content:space-between;
  font-size:13px;
  border-top:1px solid #eee;
  padding-top:8px;
}

.detail-btn {
  background:none;
  border:none;
  color:#1976d2;
  cursor:pointer;
  text-align:left;
}

.spec-detail {
  max-height:0;
  overflow:hidden;
  transition:0.3s ease;
}

.spec-detail.open {
  margin-top:10px;
  border-top:1px solid #eee;
  padding-top:10px;
}

.spec-table {
  width:100%;
  border-collapse:collapse;
  font-size:13px;
}

.spec-table td {
  padding:6px;
}

#pagination {
  text-align:center;
  margin:20px;
}
</style>
</head>

<body>

<h2>Katalog Produk</h2>

<div id="userInfo"></div>
<div id="g_id_signin"></div>
<button id="logoutBtn">Logout</button>

<div class="search-box">
  <input id="searchInput" placeholder="Search produk...">
</div>

<div id="filterBox" class="filter-box"></div>
<div id="produk-list" class="container"></div>
<div id="pagination"></div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyhqfHg8tc1aWaDiDhCZThIQd7lbWztxGl2PpJQQb4fNWUUXH5nglmiFRy4xJpnvrcF/exec";

let token = localStorage.getItem("googleToken");
let role = "public";
let allData = [];
let renderedData = [];

let search = "";
let page = 1;
const perPage = 12;

let filter = { new:false, netto:false, ppn:false };

/* ================= INIT ================= */
window.onload = () => {
  google.accounts.id.initialize({
    client_id: "317305463836-el7i52ferjgevc5t31r8ra3r47abbppf.apps.googleusercontent.com",
    callback: login
  });

  google.accounts.id.renderButton(
    document.getElementById("g_id_signin"),
    { theme:"outline", size:"large" }
  );

  document.getElementById("searchInput").oninput = e=>{
    search = e.target.value.toLowerCase();
    page = 1;
    render();
  };

  load();
};

/* ================= LOGIN ================= */
function login(res){
  token = res.credential;
  localStorage.setItem("googleToken", token);
  load();
}

/* ================= LOAD ================= */
async function load(){
  const res = await fetch(API_URL + (token ? "?token="+token : ""));
  const json = await res.json();

  role = json.role;
  allData = json.data || [];

  renderFilter();
  render();
}

/* ================= FILTER UI ================= */
function renderFilter(){
  const box = document.getElementById("filterBox");
  box.innerHTML = role === "sales"
    ? `
      <label><input id="fNew" type="checkbox"> NEW</label>
      <label><input id="fNetto" type="checkbox"> NETTO</label>
      <label><input id="fPpn" type="checkbox"> PPN</label>
    `
    : `<label><input id="fNew" type="checkbox"> NEW</label>`;

  const bind = (id,key)=>{
    const el = document.getElementById(id);
    if(!el) return;
    el.onchange = e=>{
      filter[key] = e.target.checked;
      page = 1;
      render();
    };
  };

  bind("fNew","new");
  bind("fNetto","netto");
  bind("fPpn","ppn");
}

/* ================= RENDER ================= */
function render(){

  let data = allData;

  if(search){
    data = data.filter(x =>
      (x["nama item"]||"").toLowerCase().includes(search) ||
      (x.kode||"").toLowerCase().includes(search)
    );
  }

  if(filter.new) data = data.filter(x => x.new === "YES");
  if(filter.netto) data = data.filter(x => x.netto === "YES");
  if(filter.ppn) data = data.filter(x => x.ppn);

  const total = Math.ceil(data.length/perPage);
  const start = (page-1)*perPage;

  const pageData = data.slice(start,start+perPage);
  renderedData = pageData;

  const box = document.getElementById("produk-list");
  box.innerHTML = "";

  pageData.forEach(item=>{

    const variants = (item.varianData && item.varianData.length)
      ? item.varianData
      : [{...item, varian:"-", stock:item.stock}];

    const active = variants[0];

    const spec = active.spec || {};
    const entries = Object.entries(spec);

    const summary = entries.slice(0,3)
      .map(([k,v])=>`<div><b>${k}</b>: ${v}</div>`)
      .join("");

    const detail = entries.slice(3)
      .map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`)
      .join("");

    const packaging =
      active.inner && active.inner !== "-"
      ? `${active.inner}/${active.carton} ${active.satuan||""}`
      : `${active.carton} ${active.satuan||""}`;

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="img-box">
        ${item.netto==="YES" ? `<span class="badge-netto">NETTO</span>` : ""}
        ${item.new==="YES" ? `<span class="badge-new">NEW</span>` : ""}
        <img src="images/${item.kategori}/${item["sub kategori"]}/${item.kode}.webp">
      </div>

      <h3 style="text-align:center">${item["nama item"]}</h3>

      ${
        variants.length > 1
        ? `<div>
            ${variants.map((v,i)=>
              `<button onclick="changeVar('${item.kode}',${i})">
                ${v.varian!=="-"?v.varian:"Default"}
              </button>`
            ).join("")}
          </div>`
        : ""
      }

      <div id="sum_${item.kode}">${summary}</div>

      ${
        detail
        ? `<button onclick="toggle('${item.kode}')">Detail</button>
           <div id="det_${item.kode}" class="spec-detail">
            <table class="spec-table">${detail}</table>
           </div>`
        : ""
      }

      <div class="meta-row" id="meta_${item.kode}">
        <div>${packaging}</div>
        <div>Stock: ${active.stock}</div>
      </div>

      ${role==="sales"
        ? `<div class="price">Rp ${Number(active.harga||0).toLocaleString("id-ID")}</div>`
        : ""
      }
    `;

    box.appendChild(div);
  });

  renderPage(total);
}

/* ================= VARIANT ================= */
function changeVar(kode,i){
  const item = renderedData.find(x=>x.kode===kode);
  if(!item) return;

  const v = item.varianData?.[i];
  if(!v) return;

  document.getElementById("meta_"+kode).innerHTML = `
    <div>${v.inner}/${v.carton}</div>
    <div>Stock: ${v.stock}</div>
  `;

  const sum = Object.entries(v.spec||{})
    .slice(0,3)
    .map(([k,x])=>`<div><b>${k}</b>: ${x}</div>`)
    .join("");

  document.getElementById("sum_"+kode).innerHTML = sum;
}

/* ================= DETAIL ================= */
function toggle(id){
  const el = document.getElementById("det_"+id);
  el.classList.toggle("open");
}

/* ================= PAGINATION ================= */
function renderPage(total){
  const el = document.getElementById("pagination");
  el.innerHTML = "";

  for(let i=1;i<=total;i++){
    el.innerHTML += `<button onclick="page=${i};render()">${i}</button>`;
  }
}

</script>

</body>
</html>
