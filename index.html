<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Katalog Produk</title>

  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      padding: 20px;
      background: #f5f5f5;
    }

    h2 { text-align: center; }

    .container {
      display: grid;
      grid-template-columns: repeat(2, 300px);
      gap: 80px;
      justify-content: center;
    }

    @media (max-width: 600px){
      .container { grid-template-columns: 1fr; }
    }

    .card {
      background: white;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
    }

    .card img {
      width: 100%;
      max-height: 260px;
      object-fit: contain;
    }
  </style>
</head>

<body>

<h2>Katalog Produk</h2>

<div id="userInfo"></div>

<div id="g_id_onload"
     data-client_id="317305463836-el7i52ferjgevc5t31r8ra3r47abbppf.apps.googleusercontent.com"
     data-callback="handleCredentialResponse">
</div>

<div id="g_id_signin"></div>

<div id="produk-list" class="container"></div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyhqfHg8tc1aWaDiDhCZThIQd7lbWztxGl2PpJQQb4fNWUUXH5nglmiFRy4xJpnvrcF/exec";

let googleToken = null;
let userEmail = null;

/* INIT GOOGLE LOGIN */
window.onload = function () {

  google.accounts.id.initialize({
    client_id: "317305463836-el7i52ferjgevc5t31r8ra3r47abbppf.apps.googleusercontent.com",
    callback: handleCredentialResponse
  });

  google.accounts.id.renderButton(
    document.getElementById("g_id_signin"),
    {
      theme: "outline",
      size: "large"
    }
  );

  loadProduk();
};

/* LOGIN CALLBACK */
function handleCredentialResponse(response) {

  googleToken = response.credential;

  const payload = JSON.parse(atob(googleToken.split('.')[1]));
  userEmail = payload.email;

  document.getElementById("userInfo").innerText =
    "Login: " + userEmail;

  loadProduk();
}

/* LOAD DATA */
async function loadProduk() {

  let url = API_URL;

  if (googleToken) {
    url += "?token=" + encodeURIComponent(googleToken);
  }

  const res = await fetch(url);
  const json = await res.json();

  const container = document.getElementById("produk-list");
  container.innerHTML = "";

  if (!json.data || json.data.length === 0) {
    container.innerHTML = "<p>Data kosong</p>";
    return;
  }

  json.data.forEach(item => {

    const spec = item.spec || {};

    const specHtml = Object.entries(spec)
      .map(([k,v]) => `<p><b>${k}:</b> ${v}</p>`)
      .join("");

    const hasInner = item.inner && item.inner !== "-"; 
    const packaging = hasInner ? ${item.inner}/${item.carton} ${item.satuan || ""} : ${item.carton} ${item.satuan || ""};
    
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="images/${item.kategori}/${item["sub kategori"]}/${item.kode}.webp">

      <h3 style="text-align:center;">${item["nama item"]}</h3>

      ${specHtml}

      <p><b>Packaging:</b> ${packaging} </p>

      <p><b>Stock:</b> ${item.stock}</p>
    `;

    container.appendChild(div);
  });
}

</script>

</body>
</html>
