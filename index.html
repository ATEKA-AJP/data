<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Katalog Produk</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
    }

    h1 {
      text-align: center;
      padding: 15px;
      background: #333;
      color: white;
      margin: 0;
    }

    .container {
      padding: 15px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 15px;
    }

    .card {
      background: white;
      padding: 12px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .card h3 {
      margin: 0 0 5px;
      font-size: 16px;
    }

    .card p {
      margin: 3px 0;
      font-size: 13px;
      color: #555;
    }

    .loading {
      text-align: center;
      padding: 20px;
    }
  </style>
</head>

<body>

  <h1>Katalog Produk</h1>

  <div id="loading" class="loading">Loading...</div>

  <div id="produk-list" class="container"></div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyhqfHg8tc1aWaDiDhCZThIQd7lbWztxGl2PpJQQb4fNWUUXH5nglmiFRy4xJpnvrcF/exec"; // 🔥 GANTI INI

    async function loadProduk() {
      try {
        const res = await fetch(API_URL);
        const json = await res.json();

        const container = document.getElementById("produk-list");
        const loading = document.getElementById("loading");

        loading.style.display = "none";
        container.innerHTML = "";

        const data = json.data;

        if (!data || data.length === 0) {
          container.innerHTML = "<p>Tidak ada data</p>";
          return;
        }

        data.forEach(item => {
          const div = document.createElement("div");
          div.className = "card";

          div.innerHTML = `
            <h3>${item["nama item"] || "-"}</h3>
            <p><b>Kode:</b> ${item.kode || "-"}</p>
            <p><b>Kategori:</b> ${item.kategori || "-"}</p>
            <p><b>Sub:</b> ${item["sub kategori"] || "-"}</p>
            <p><b>Stock:</b> ${item.stock || 0}</p>
          `;

          container.appendChild(div);
        });

      } catch (err) {
        console.error(err);
        document.getElementById("loading").innerHTML = "Gagal load data";
      }
    }

    document.addEventListener("DOMContentLoaded", loadProduk);
  </script>

</body>
</html>
