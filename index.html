<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Katalog Produk</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: #f5f5f5;
    }

    h2 {
      text-align: center;
    }
   
     /*Desktop*/
    .container {
      display: grid;
      grid-template-columns: repeat(2, minmax(300px, 1fr));
      gap: 15px;
      justify-items: center;
    }

    /*HP*/
    @media (max-width: 600px){
      .container {
        grid-template-colums: 1fr !important;
      }
    }
    
    .card {
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 10px;
      text-align: left;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 320px;
    }

    .card img {
      display: block;
      margin: 0 auto;
      width: 100%;
      height: 180px;
      object-fit: contain;
      margin-bottom: 10px;
    }

    .card h3 {
      margin: 5px 0;
      font-size: 16px;
    }

    .card p {
      margin: 4px 0;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <h2>Katalog Produk</h2>

  <div id="produk-list" class="container"></div>

  <script>

    const API_URL = "https://script.google.com/macros/s/AKfycbyhqfHg8tc1aWaDiDhCZThIQd7lbWztxGl2PpJQQb4fNWUUXH5nglmiFRy4xJpnvrcF/exec";

    async function loadProduk() {

      const container = document.getElementById("produk-list");

      if (!container) {
        console.error("DIV produk-list tidak ditemukan");
        return;
      }

      try {

        const res = await fetch(API_URL);
        const json = await res.json();

        console.log(json);

        container.innerHTML = "";

        if (!json.data || json.data.length === 0) {
          container.innerHTML = "<p>Data kosong</p>";
          return;
        }

        json.data.forEach(item => {
            const imgPath =
            "images/" +
            item.kategori + "/" +
            item["sub kategori"] + "/" +
            item.kode + ".webp";

            const div = document.createElement("div");
            div.className = "card";

            // Olah data spec dari JSON string
            let specHtml = "-";

            if (item.spec) {
              try {
                const specObj = JSON.parse(item.spec);

                specHtml = Object.entries(specObj)
                  .map(([key, value]) =>
                    `<p><b>${key}:</b> ${value}</p>`
                  )
                  .join("");
                
              } catch (err) {
                console.error("Format spec tidak valid:", item.spec);
                specHtml = item.spec;
              }
            }

            // Olah data packaging
            const hasInner =
              item.inner &&
              item.inner !== "-";

            const packaging = hasInner
              ? `${item.inner}/${item.carton} ${item.satuan || ""}`
              : `${item.carton} ${item.satuan || ""}`;
          
            div.innerHTML = `
            <img
            src="${imgPath}"
            alt="${item["nama item"] || ""}"
            loading="lazy"
            style="width:150px;height:auto;"
             >
            
            <h3 style="text-align:center;">${item["nama item"] || "-"}</h3>

           ${specHtml}

            <p><b>Packaging:</b> ${packaging} </p>

            <p><b>Harga:</b> Rp. ${Number(item.harga).toLocaleString("id-ID")}/${item.satuan || "-"}</p>

            <p><b>Stock:</b> ${item.stock || 0}</p>
          `;

          container.appendChild(div);

        });

      } catch (err) {

        console.error(err);
        container.innerHTML = "<p>Gagal load data</p>";

      }

    }

    window.onload = loadProduk;

  </script>

</body>
</html>
