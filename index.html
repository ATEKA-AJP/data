<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Katalog Produk</title>

  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      padding: 20px;
      background: #f5f5f5;
    }

    h2 { text-align: center; }

    #userInfo {
      text-align:center;
      margin-bottom:10px;
    }

    .container {
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
      gap:24px;
    }

    .card {
      background: white;
      padding: 15px;
      border: 1px solid #ddd;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: transform 0.2s ease;
    }

    .summary-spec {
      display: grid;
      gap: 3px;
      font-size: 13px;
      color: #444;
    }

    .summary-spec div {
      color: #444;
    }

    .detail-btn {
      background: none;
      border: none;
      color: #1976d2;
      font-weight: 600;
      cursor: pointer;
      padding: 4px 0;
      text-align: left;
      font-size: 13px;
    }
    
    .detail-btn:hover {
      text-decoration: underline;
    }
    
    .spec-detail {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }
    
    .spec-detail.open {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #eee;
    }
    
    .spec-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    
    .spec-table td {
      padding: 6px;
    }
    
    .spec-table tr:nth-child(even) {
      background: #f5f5f5;
    }
    
    .spec-table td:first-child {
      width: 40%;
      font-weight: bold;
      color: #555;
    }

    .card img {
      width: 100%;
      max-height: 260px;
      object-fit: contain;
    }

    .img-box { position: relative; }

    .badge-netto {
      position: absolute;
      top: 30px;
      right: 10px;
      background: #4caf50;
      color: white;
      padding: 4px 8px;
      font-size: 11px;
      border-radius: 5px;
      font-weight: bold;
    }

    .badge-new {
      position: absolute;
      top: 10px;
      right: 10px;
      background: #c12327;
      color: white;
      padding: 4px 8px;
      font-size: 11px;
      border-radius: 5px;
      font-weight: bold;
    }

    .filter-box {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin: 10px 0;
      flex-wrap: wrap;
    }

    .filter-box label {
      background: white;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid #ddd;
      cursor: pointer;
    }

    #logoutBtn {
      display: none;
      margin: 10px auto;
      padding: 8px 12px;
      border: none;
      background: #e53935;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    #searchInput {
      padding: 8px;
      width: 250px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    .search-box {
      text-align:center;
      margin-bottom:10px;
    }

    #pagination {
      text-align:center;
      margin:20px;
    }

    #pagination button {
      margin: 0 3px;
      padding: 5px 10px;
      cursor: pointer;
    }

    .price {
      margin-top: auto;
      font-size: 18px;
      font-weight: bold;
      color: #e53935;
    }

    .meta-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: #555;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #eee;
    }
  </style>
</head>

<body>

<h2>Katalog Produk</h2>

<div id="userInfo"></div>

<div id="g_id_signin"></div>

<button id="logoutBtn">Logout</button>

<div class="search-box">
  <input id="searchInput" type="text" placeholder="Search produk...">
</div>

<div id="filterBox" class="filter-box"></div>

<div id="produk-list" class="container"></div>

<div id="pagination"></div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyhqfHg8tc1aWaDiDhCZThIQd7lbWztxGl2PpJQQb4fNWUUXH5nglmiFRy4xJpnvrcF/exec";

/* =====================
   STATE
===================== */
let googleToken = null;
let userRole = "public";
let allData = [];
  
let currentRenderedData = [];

let lastEmail = localStorage.getItem("lastEmail") || "";
let searchQuery = "";

let currentPage = 1;
const itemsPerPage = 12;

let filterState = {
  new: false,
  netto: false,
  ppn: false
};

/* =====================
   INIT
===================== */
window.onload = function () {

  google.accounts.id.initialize({
    client_id: "317305463836-el7i52ferjgevc5t31r8ra3r47abbppf.apps.googleusercontent.com",
    callback: handleCredentialResponse
  });

  google.accounts.id.renderButton(
    document.getElementById("g_id_signin"),
    { theme: "outline", size: "large" }
  );

  document.getElementById("logoutBtn").onclick = logout;

  document.getElementById("searchInput").addEventListener("input", (e) => {
    searchQuery = e.target.value.toLowerCase();
    currentPage = 1;
    renderProduk();
  });

  googleToken = localStorage.getItem("googleToken");

  if (googleToken) {

    if (isTokenExpired(googleToken)) {
      forceLogout();
    } else {
      try {
        const payload = JSON.parse(atob(googleToken.split('.')[1]));

        lastEmail = payload.email;
        localStorage.setItem("lastEmail", lastEmail);

        document.getElementById("userInfo").innerText =
          "Login: " + payload.email;

        document.getElementById("logoutBtn").style.display = "block";

      } catch (e) {
        forceLogout();
      }
    }

  } else {
    if (lastEmail) {
      document.getElementById("userInfo").innerText =
        "Last login: " + lastEmail;
    }
  }

  loadProduk();
};

/* =====================
   LOGIN
===================== */
function handleCredentialResponse(response) {

  googleToken = response.credential;
  localStorage.setItem("googleToken", googleToken);

  const payload = JSON.parse(atob(googleToken.split('.')[1]));

  lastEmail = payload.email;
  localStorage.setItem("lastEmail", lastEmail);

  document.getElementById("userInfo").innerText =
    "Login: " + payload.email;

  document.getElementById("logoutBtn").style.display = "block";

  loadProduk();
}

/* =====================
   TOKEN CHECK
===================== */
function isTokenExpired(token) {
  try {
    const payload = JSON.parse(atob(token.split('.')[1]));
    return payload.exp < Math.floor(Date.now() / 1000);
  } catch (e) {
    return true;
  }
}

/* =====================
   LOGOUT
===================== */
function logout() {
  localStorage.removeItem("googleToken");
  googleToken = null;
  userRole = "public";

  document.getElementById("logoutBtn").style.display = "none";

  if (lastEmail) {
    document.getElementById("userInfo").innerText =
      "Last login: " + lastEmail;
  }

  filterState = { new: false, netto: false, ppn: false };
  currentPage = 1;

  loadProduk();
}

/* =====================
   FORCE LOGOUT
===================== */
function forceLogout() {
  localStorage.removeItem("googleToken");
  googleToken = null;
  userRole = "public";

  document.getElementById("logoutBtn").style.display = "none";

  if (lastEmail) {
    document.getElementById("userInfo").innerText =
      "Last login: " + lastEmail;
  }

  filterState = { new: false, netto: false, ppn: false };
  currentPage = 1;

  loadProduk();
}

/* =====================
   FILTER UI
===================== */
function renderFilters(role) {

  const box = document.getElementById("filterBox");
  box.innerHTML = "";

  userRole = role;

  if (role === "public") {
    box.innerHTML = `
      <label><input type="checkbox" id="filterNew"> NEW</label>
    `;
  }

  if (role === "sales") {
    box.innerHTML = `
      <label><input type="checkbox" id="filterNew"> NEW</label>
      <label><input type="checkbox" id="filterNetto"> NETTO</label>
      <label><input type="checkbox" id="filterPpn"> PPN</label>
    `;
  }

  bindFilters();
}

/* =====================
   FILTER EVENTS
===================== */
function bindFilters() {

  const newEl = document.getElementById("filterNew");
  const nettoEl = document.getElementById("filterNetto");
  const ppnEl = document.getElementById("filterPpn");

  if (newEl) {
    newEl.onchange = (e) => {
      filterState.new = e.target.checked;
      currentPage = 1;
      renderProduk();
    };
  }

  if (nettoEl) {
    nettoEl.onchange = (e) => {
      filterState.netto = e.target.checked;
      currentPage = 1;
      renderProduk();
    };
  }

  if (ppnEl) {
    ppnEl.onchange = (e) => {
      filterState.ppn = e.target.checked;
      currentPage = 1;
      renderProduk();
    };
  }
}

/* =====================
   LOAD DATA
===================== */
async function loadProduk() {

  const res = await fetch(API_URL + buildQuery());
  const json = await res.json();

  userRole = json.role;
  allData = json.data || [];

  renderFilters(json.role);
  renderProduk();
}

/* =====================
   QUERY
===================== */
function buildQuery() {
  const params = [];

  if (googleToken) {
    params.push("token=" + encodeURIComponent(googleToken));
  }

  return params.length ? "?" + params.join("&") : "";
}

/* =====================
   RENDER + SEARCH + FILTER + PAGINATION
===================== */
function renderProduk() {
   
  const container = document.getElementById("produk-list");
  container.innerHTML = "";

  let data = allData;

  /* SEARCH */
  if (searchQuery) {
    data = data.filter(item =>
      (item["nama item"] || "").toLowerCase().includes(searchQuery) ||
      (item.kode || "").toLowerCase().includes(searchQuery)
    );
  }

  /* FILTER */
  if (filterState.new) {
    data = data.filter(item => item.new === "YES");
  }

  if (filterState.netto) {
    data = data.filter(item => item.netto === "YES");
  }

  if (filterState.ppn) {
    data = data.filter(item => item.ppn);
  }

  /* PAGINATION */
  const totalPages = Math.ceil(data.length / itemsPerPage);

  if (currentPage > totalPages) currentPage = 1;

  const start = (currentPage - 1) * itemsPerPage;
  const pageData = data.slice(start, start + itemsPerPage);
  currentRenderedData = pageData;

  if (!pageData.length) {
    container.innerHTML = "<p>Data tidak ditemukan</p>";
    document.getElementById("pagination").innerHTML = "";
    return;
  }

  pageData.forEach(item => {
    const detailId = `detail_${item.kode}`;
    const activeVariant =
      item.varianData?.[0] || item;
    
    const spec = activeVariant.spec || {};
    
    const specEntries = Object.entries(spec);
    
    const summaryCount = 3;
    const hasDetail = specEntries.length > 5;
    
    const summaryHtml = specEntries
      .slice(0, summaryCount)
      .map(([k,v]) => `
        <div><b>${k}</b>: ${v}</div>
      `)
      .join("");

    const detailHtml = `
    <table class="spec-table">
    ${specEntries
      .slice(summaryCount)
      .map(([k,v]) => `
        <tr>
          <td>${k}</td>
          <td>${v}</td>
        </tr>
      `).join("")}
    </table>
    `;

    let packaging =
      activeVariant.inner &&
      activeVariant.inner !== "-"
        ? `${activeVariant.inner}/${activeVariant.carton} ${activeVariant.satuan || ""}`
        : `${activeVariant.carton} ${activeVariant.satuan || ""}`;

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="img-box">
        ${item.netto === "YES" ? `<span class="badge-netto">NETTO</span>` : ""}
        ${item.new === "YES" ? `<span class="badge-new">NEW</span>` : ""}
        <img src="images/${item.kategori}/${item["sub kategori"]}/${item.kode}.webp">
      </div>

      <h3 style="text-align:center;">
        ${item["nama item"]}
      </h3>

      ${item.varianData.length > 1 ? `
        <div style="display:flex;gap:6px;flex-wrap:wrap;">
          ${item.varianData.map((v,i)=>`
            <button onclick="changeVariant('${item.kode}', ${i})"
              style="padding:4px 8px;border:1px solid #ccc;border-radius:6px;">
              ${v.varian}
            </button>
          `).join("")}
        </div>
      ` : ""}

      <div class="summary-spec" id="summary_${item.kode}">
        ${summaryHtml}
      </div>
      
      ${hasDetail ? `
      <button
        id="btn_${detailId}"
        class="detail-btn"
        onclick="toggleSpec('${detailId}')">
        ▼ Detail Spesifikasi
      </button>
      
      <div
        id="${detailId}"
        class="spec-detail">
      
        <div id="detail_content_${item.kode}">
          ${detailHtml}
        </div>
      
      </div>
      ` : ""}
      
      <div class="meta-row" id="meta_${item.kode}">
        <div><b>Packaging:</b> ${packaging}</div>
        <div><b>Stock:</b> ${activeVariant.stock}</div>
      </div>

      ${
        userRole === "sales"
          ? `
          <p class="price" id="price_${item.kode}">
            Rp ${Number(activeVariant.harga || 0).toLocaleString("id-ID")}
            /${activeVariant["satuan"]}
          </p>
          `
          : ""
      }
    `;

    container.appendChild(div);
  });

  renderPagination(totalPages);
}

/* =====================
   PAGINATION UI
===================== */
function renderPagination(totalPages) {

  const el = document.getElementById("pagination");
  el.innerHTML = "";

  if (totalPages <= 1) return;

  let html = "";

  html += `<button onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? "disabled" : ""}>Prev</button>`;

  for (let i = 1; i <= totalPages; i++) {
    html += `<button onclick="changePage(${i})" style="${i === currentPage ? 'font-weight:bold' : ''}">${i}</button>`;
  }

  html += `<button onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? "disabled" : ""}>Next</button>`;

  el.innerHTML = html;
}

function toggleSpec(id) {
  const el = document.getElementById(id);
  const btn = document.getElementById("btn_" + id);

  if (!el) return;

  if (el.style.maxHeight && el.style.maxHeight !== "0px") {
    el.style.maxHeight = "0px";
    el.classList.remove("open");
    btn.textContent = "▼ Detail Spesifikasi";
  } else {
    el.classList.add("open");
    el.style.maxHeight = el.scrollHeight + "px";
    btn.textContent = "▲ Sembunyikan Detail";
  }
}

function changeVariant(kode, index) {
  const item = currentRenderedData.find(x => x.kode === kode);
  if (!item || !item.varianData) return;

  const variant = item.varianData[Number(index)];
  if (!variant) return;

  const specEntries = Object.entries(variant.spec || {});
  const summaryCount = 3;

  // ===== SUMMARY =====
  const summaryEl = document.getElementById("summary_" + kode);
  if (summaryEl) {
    summaryEl.innerHTML = specEntries
      .slice(0, summaryCount)
      .map(([k, v]) => `<div><b>${k}</b>: ${v}</div>`)
      .join("");
  }

  // ===== DETAIL =====
  const detailEl = document.getElementById("detail_content_" + kode);
  if (detailEl) {
    detailEl.innerHTML = `
      <table class="spec-table">
        ${specEntries
          .slice(summaryCount)
          .map(([k, v]) => `
            <tr>
              <td>${k}</td>
              <td>${v}</td>
            </tr>
          `).join("")}
      </table>
    `;
  }

  // ===== META =====
  const packaging =
    variant.inner && variant.inner !== "-"
      ? `${variant.inner}/${variant.carton} ${variant.satuan || ""}`
      : `${variant.carton} ${variant.satuan || ""}`;

  const metaEl = document.getElementById("meta_" + kode);
  if (metaEl) {
    metaEl.innerHTML = `
      <div><b>Packaging:</b> ${packaging}</div>
      <div><b>Stock:</b> ${variant.stock}</div>
    `;
  }

  // ===== PRICE =====
  const priceEl = document.getElementById("price_" + kode);
  if (priceEl) {
    priceEl.innerHTML = `
      Rp ${Number(variant.harga || 0).toLocaleString("id-ID")}
      /${variant.satuan || ""}
    `;
  }

  // ===== AUTO RESIZE IF OPEN =====
  const detailBox = document.getElementById("detail_" + kode);
  if (detailBox && detailBox.classList.contains("open")) {
    requestAnimationFrame(() => {
      detailBox.style.maxHeight = detailBox.scrollHeight + "px";
    });
  }
}
  
/* =====================
   CHANGE PAGE
===================== */
function changePage(page) {
  currentPage = page;
  renderProduk();
}

</script>

</body>
</html>
